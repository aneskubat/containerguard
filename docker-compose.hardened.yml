# HARDENED docker-compose.yml
# All security checks pass - ContainerGuard score: 100/100

version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:8080"

    # DC003 - FIXED: Secrets loaded from .env file (not in repository)
    env_file:
      - .env

    # DC001 - FIXED: Privileged mode removed
    # privileged: true  <-- removed!

    # DC002 - FIXED: Docker socket not mounted
    volumes:
      - app-data:/app/data

    # DC004 - FIXED: Resource limits defined
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    # DC005 - FIXED: Restart policy defined
    restart: unless-stopped

    # Additional hardening
    security_opt:
      - no-new-privileges:true
    read_only: true

  db:
    image: postgres:16.3
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  app-data:
  db-data: