# ⚠️  THIS IS AN INTENTIONALLY VULNERABLE CONFIGURATION - FOR TESTING ONLY!

version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
    # DC003 - Hardcoded password!
    environment:
      - DB_PASSWORD=admin1234
      - SECRET_KEY=my_secret_password
    # DC001 - Privileged mode!
    privileged: true
    volumes:
      # DC002 - Docker socket mounted into container!
      - /var/run/docker.sock:/var/run/docker.sock
    # DC004 - No resource limits!
    # DC005 - No restart policy!

  db:
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=root123