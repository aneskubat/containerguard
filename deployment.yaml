# ⚠️  THIS IS AN INTENTIONALLY VULNERABLE CONFIGURATION - FOR TESTING ONLY!

apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: myapp-pod
    spec:
      # K8S008 - hostNetwork removes network isolation!
      hostNetwork: true
      
      containers:
      - name: myapp
        # K8S004 - latest tag!
        image: nginx:latest
        
        ports:
        - containerPort: 80
        
        # K8S010 - Hardcoded secrets in env variables!
        env:
        - name: DB_PASSWORD
          value: "admin1234"
        - name: API_KEY
          value: "super_secret_key_123"
        
        securityContext:
          # K8S002 - Privileged container!
          privileged: true
          # K8S005 - allowPrivilegeEscalation not disabled!
        
        # K8S003 - No resource limits!
        # K8S006 - No liveness/readiness probes!
        # K8S007 - readOnlyRootFilesystem not set!
        
    # K8S001 - No runAsNonRoot!
    # K8S009 - No labels!