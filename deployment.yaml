# ⚠️  OVO JE NAMJERNO RANJIVA KONFIGURACIJA - SAMO ZA TESTIRANJE!

apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: myapp-pod
    spec:
      # K8S008 - hostNetwork uklanja mrežnu izolaciju!
      hostNetwork: true
      
      containers:
      - name: myapp
        # K8S004 - latest tag!
        image: nginx:latest
        
        ports:
        - containerPort: 80
        
        # K8S010 - Hardcoded tajne u env varijablama!
        env:
        - name: DB_PASSWORD
          value: "admin1234"
        - name: API_KEY
          value: "super_secret_key_123"
        
        securityContext:
          # K8S002 - Privilegovani kontejner!
          privileged: true
          # K8S005 - allowPrivilegeEscalation nije false!
        
        # K8S003 - Nema resource limits!
        # K8S006 - Nema liveness/readiness probe!
        # K8S007 - readOnlyRootFilesystem nije true!
        
    # K8S001 - Nema runAsNonRoot!
    # K8S009 - Nema labels!